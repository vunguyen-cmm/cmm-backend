name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "283209027441"
  ECR_REPOSITORY: cmm/backend
  ECS_APP_NAME: cmm-backend

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    env:
      ENV: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: .github/scripts/build-push-image.sh

      - name: Download current task definition
        run: .github/scripts/download-task-definition.sh

      - name: Build secrets from manifest
        run: .github/scripts/build-secrets.sh

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: backend
          image: ${{ steps.build-image.outputs.image }}

      - name: Register task definition
        id: register-task-def
        env:
          TASK_DEF_FILE: ${{ steps.task-def.outputs.task-definition }}
        run: .github/scripts/register-task-definition.sh

      - name: Run Alembic migrations
        env:
          TASK_DEF_ARN: ${{ steps.register-task-def.outputs.task-def-arn }}
        run: .github/scripts/run-migrations.sh

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: cmm-${{ env.ENV }}-backend
          cluster: cmm-${{ env.ENV }}-cluster
          wait-for-service-stability: true
